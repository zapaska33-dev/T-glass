version: '3.8'

services:
  t-glass:
    image: python:3.10-slim
    container_name: tglass
    restart: unless-stopped
    ports:
      - "19945:80"
    volumes:
      - app:/app
      - techno5_app-data:/data
    environment:
      - PYTHONUNBUFFERED=1
      - TRADERNET_TICKER=TECHSMART
    command: >
      sh -c "
        pip install aiohttp &&
        python -c '
import asyncio
import os
from aiohttp import web

TICKER = os.environ.get(\"TRADERNET_TICKER\", \"TECHSMART\")

async def health(request):
    return web.json_response({\"status\": \"ok\", \"ticker\": TICKER})

async def main():
    app = web.Application()
    app.router.add_get(\"/health\", health)
    runner = web.AppRunner(app)
    await runner.setup()
    await web.TCPSite(runner, \"0.0.0.0\", 80).start()
    print(f\"?? T-GLASS RUNNING | {TICKER}\")
    await asyncio.Event().wait()

asyncio.run(main())
'
      "

volumes:
  app:
    external: true
    name: app
  techno5_app-data:
    external: true
    name: techno5_app-data