version: '3.8'

services:
  # Основной контейнер T-GLASS
  app:
    image: zapaska33/zapaska33:latest
    container_name: t-glass
    restart: unless-stopped
    ports:
      - "19943:80"
    volumes:
      - app-data:/data
      - app-logs:/data/logs
    environment:
      - PYTHONUNBUFFERED=1
      - TRADERNET_TICKER=${TRADERNET_TICKER}
      - TRADERNET_PUBLIC_KEY=${TRADERNET_PUBLIC_KEY}
      - TRADERNET_PRIVATE_KEY=${TRADERNET_PRIVATE_KEY}
      - MAX_BOT_TOKEN=${MAX_BOT_TOKEN}
      - MAX_CHAT_ID=${MAX_CHAT_ID}
      - VSEGPT_API_KEY=${VSEGPT_API_KEY}
      - VSEGPT_API_URL=${VSEGPT_API_URL}
      - VSEGPT_MODEL=${VSEGPT_MODEL}
      - VSEGPT_MAX_TOKENS=${VSEGPT_MAX_TOKENS}
      - VSEGPT_TEMPERATURE=${VSEGPT_TEMPERATURE}
      - SETUP_SCORE_REQUIRED=${SETUP_SCORE_REQUIRED}
      - AI_CONFIDENCE_REQUIRED=${AI_CONFIDENCE_REQUIRED}
      - AI_COOLDOWN_SECONDS=${AI_COOLDOWN_SECONDS}
      - MIN_BIAS_FOR_AI=${MIN_BIAS_FOR_AI}
      - MIN_DELTA_FOR_AI=${MIN_DELTA_FOR_AI}
      - MIN_PRINT_VOLUME=${MIN_PRINT_VOLUME}
      - MIN_DELTA_VOLUME=${MIN_DELTA_VOLUME}
      - DELTA_THRESHOLD=${DELTA_THRESHOLD}
      - TAPE_SPEED_THRESHOLD=${TAPE_SPEED_THRESHOLD}
      - ABSORPTION_THRESHOLD=${ABSORPTION_THRESHOLD}
      - BIG_WALL_SIZE=${BIG_WALL_SIZE}
      - SPOOF_SIZE_THRESHOLD=${SPOOF_SIZE_THRESHOLD}
      - ICEBERG_MIN_VOLUME=${ICEBERG_MIN_VOLUME}
      - ICEBERG_TOTAL_VOLUME=${ICEBERG_TOTAL_VOLUME}
      - ICEBERG_MIN_TRADES=${ICEBERG_MIN_TRADES}
      - PRICE_RESPONSE_THRESHOLD=${PRICE_RESPONSE_THRESHOLD}
      - PRICE_TICK=${PRICE_TICK}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.monitor-only=false"
    networks:
      - t-glass-network

  # Watchtower для автоматического обновления контейнера
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=3600
      - WATCHTOWER_LABEL_ENABLE=true
      - TZ=Europe/Moscow
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    command: --interval 3600 --cleanup --label-enable
    networks:
      - t-glass-network

volumes:
  app-data:
    driver: local
  app-logs:
    driver: local

networks:
  t-glass-network:
    driver: bridge