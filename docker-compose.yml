cat > docker-compose.yml << 'EOF'
version: '3.8'

services:
  t-glass:
    image: python:3.10-slim
    container_name: tglass
    restart: unless-stopped
    ports:
      - "19945:80"
    volumes:
      - app:/app
      - techno5_app-data:/data
      - ./t-glass.py:/app/t-glass.py:ro
      - ./config.py:/app/config.py:ro
    environment:
      - PYTHONUNBUFFERED=1
      - TRADERNET_TICKER=TECHSMART
    command: >
      sh -c "
        pip install aiohttp &&
        cd /app &&
        python t-glass.py
      "

volumes:
  app:
    external: true
    name: app
  techno5_app-data:
    external: true
    name: techno5_app-data
EOF