version: '3.8'

services:
  app:
    image: zapaska33/zapaska33:latest
    container_name: tglass
    restart: unless-stopped
    ports:
      - "19944:80"
    volumes:
      - app:/app
      - app-data:/data
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - TRADERNET_TICKER=TECHSMART
      - TRADERNET_PUBLIC_KEY=${TRADERNET_PUBLIC_KEY}
      - TRADERNET_PRIVATE_KEY=${TRADERNET_PRIVATE_KEY}
      - MAX_BOT_TOKEN=${MAX_BOT_TOKEN}
      - MAX_CHAT_ID=${MAX_CHAT_ID}
      - VSEGPT_API_KEY=${VSEGPT_API_KEY}
    command: >
      sh -c "
        pip install --no-cache-dir aiohttp requests python-dotenv platformdirs maxapi tradernet &&
        cd /app &&
        python t-glass.py
      "

volumes:
  app:
    external: true
    name: app
  app-data:
    driver: local