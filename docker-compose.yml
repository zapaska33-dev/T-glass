version: '3.8'

services:
  t-glass:
    build: .
    container_name: t-glass
    restart: unless-stopped
    ports:
      - "19945:80"
    volumes:
      - app:/data:rw
      - ./logs:/app/logs:rw
      - ./tradernet:/app/tradernet:ro  # Монтируем распакованный tradernet SDK
    env_file:
      - .env
    environment:
      - PORT=80
      - PYTHONUNBUFFERED=1
      - TRADERNET_TICKER=${TRADERNET_TICKER:-TECHSMART}
      - MAX_BOT_TOKEN=${MAX_BOT_TOKEN}
      - MAX_CHAT_ID=${MAX_CHAT_ID}
      - VSEGPT_API_KEY=${VSEGPT_API_KEY}
      - TRADERNET_PUBLIC_KEY=${TRADERNET_PUBLIC_KEY}
      - TRADERNET_PRIVATE_KEY=${TRADERNET_PRIVATE_KEY}
      - PYTHONPATH=/app:/app/tradernet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  app:
    external: true
    name: app